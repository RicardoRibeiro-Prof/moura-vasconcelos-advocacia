name: Diagnosticar GitHub Pages

on:
  push:
    paths:
      - '.github/workflows/diagnose-pages.yml'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

env:
  SITE_URL: https://ricardoribeiro-prof.github.io/moura-vasconcelos-advocacia/

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Baixar o repositório
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.5
          cache: npm

      - name: Gerar o site
        id: build
        continue-on-error: true
        run: |
          npm ci
          npm run build

      - name: Configurar Pages
        id: configure
        continue-on-error: true
        uses: actions/configure-pages@v6
        with:
          enablement: true

      - name: Enviar artifact
        id: upload
        continue-on-error: true
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./dist
          retention-days: 1
          include-hidden-files: true

      - name: Publicar artifact
        id: deploy
        continue-on-error: true
        uses: actions/deploy-pages@v5
        with:
          artifact_name: github-pages

      - name: Registrar diagnóstico
        if: always()
        shell: bash
        run: |
          {
            echo '# Diagnóstico do GitHub Pages'
            echo
            echo "- Commit: $GITHUB_SHA"
            echo "- Build: ${{ steps.build.outcome }}"
            echo "- Configure Pages: ${{ steps.configure.outcome }}"
            echo "- Upload artifact: ${{ steps.upload.outcome }}"
            echo "- Deploy Pages: ${{ steps.deploy.outcome }}"
            echo "- Page URL: ${{ steps.deploy.outputs.page_url }}"
            echo "- Artifact ID: ${{ steps.upload.outputs.artifact_id }}"
            echo "- Base path: ${{ steps.configure.outputs.base_path }}"
            echo "- Origin: ${{ steps.configure.outputs.origin }}"
          } > DIAGNOSTIC-PAGES.md

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add DIAGNOSTIC-PAGES.md
          git commit -m 'Registra diagnóstico do GitHub Pages' || true
          git push

      - name: Falhar quando a publicação não concluir
        if: always()
        shell: bash
        run: |
          test '${{ steps.build.outcome }}' = 'success'
          test '${{ steps.configure.outcome }}' = 'success'
          test '${{ steps.upload.outcome }}' = 'success'
          test '${{ steps.deploy.outcome }}' = 'success'
