name: Montar e publicar novo projeto jurídico

on:
  push:
    paths:
      - '.github/workflows/bootstrap-project.yml'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: bootstrap-moura-vasconcelos
  cancel-in-progress: false

jobs:
  build-project:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      VITE_SITE_URL: https://ricardoribeiro-prof.github.io/moura-vasconcelos-advocacia
      VITE_BASE_PATH: /moura-vasconcelos-advocacia/
      VITE_IS_DEMO: 'true'
      VITE_ALLOW_INDEXING: 'false'
      VITE_PRODUCTION_DATA_CONFIRMED: 'false'

    steps:
      - name: Baixar o repositório novo
        uses: actions/checkout@v7

      - name: Copiar a base técnica validada
        shell: bash
        run: |
          set -euo pipefail
          git clone --depth 1 https://github.com/RicardoRibeiro-Prof/almeida-castro-advocacia.git /tmp/template
          rsync -a --delete --exclude='.git' /tmp/template/ ./

      - name: Aplicar nova marca, textos e endereços
        shell: bash
        run: |
          set -euo pipefail
          python <<'PY'
          from pathlib import Path

          replacements = {
              'Almeida & Castro Advocacia': 'Moura & Vasconcelos Advocacia',
              'Almeida & Castro': 'Moura & Vasconcelos',
              'Almeida &amp; Castro': 'Moura &amp; Vasconcelos',
              'AlmeidaCastro': 'MouraVasconcelos',
              'almeida-castro-advocacia': 'moura-vasconcelos-advocacia',
              'almeidaecastro': 'mouraevasconcelos',
              'Dr. Rafael Almeida': 'Dr. Lucas Vasconcelos',
              'Dra. Marina Castro': 'Dra. Helena Moura',
              'Rafael Almeida': 'Lucas Vasconcelos',
              'Marina Castro': 'Helena Moura',
              'team-rafael.jpg': 'team-lucas.jpg',
              'team-marina.jpg': 'team-helena.jpg',
              '(89) 99999-9999': '(89) 98888-0000',
              '5589999999999': '5589988880000',
              'contato@almeidaecastro.adv.br': 'contato@mouraevasconcelos.adv.br',
              'Av. Professor João Menezes, 250, Centro, São Raimundo Nonato – PI': 'Rua das Acácias, 180, Centro, São Raimundo Nonato – PI',
              'Atuação jurídica ética, estratégica e próxima de você.': 'Clareza para decidir. Estratégia para avançar.',
              'Advocacia em São Raimundo Nonato – PI': 'Advocacia contemporânea em São Raimundo Nonato – PI',
              'Orientação responsável para pessoas, famílias e empresas, com análise cuidadosa, linguagem clara e atenção às particularidades de cada situação.': 'Orientação jurídica para pessoas, famílias e negócios, com escuta cuidadosa, organização e comunicação direta em cada etapa.',
              'Informação clara para decisões jurídicas mais conscientes.': 'Direção jurídica para escolhas mais seguras e conscientes.',
              'Seriedade jurídica com atendimento humano e organizado': 'Técnica jurídica com presença humana e organizada',
              'Orientação jurídica em diferentes momentos': 'Soluções jurídicas para pessoas, famílias e negócios',
              'Proximidade sem perder a objetividade técnica': 'Proximidade, contexto e direção jurídica',
              'Experiência, escuta e atuação integrada': 'Olhares complementares para decisões mais seguras',
              'Informação para compreender seus direitos': 'Conteúdo para orientar escolhas e prevenir conflitos',
              'Precisa de orientação sobre uma questão jurídica?': 'Vamos organizar sua dúvida e avaliar os próximos passos?',
              'Projeto demonstrativo Almeida & Castro Advocacia': 'Projeto demonstrativo Moura & Vasconcelos Advocacia',
          }

          extensions = {'.js', '.jsx', '.mjs', '.json', '.md', '.html', '.css', '.yml', '.yaml', '.toml', '.txt', '.svg'}
          for file in Path('.').rglob('*'):
              if not file.is_file() or '.git' in file.parts or file.suffix.lower() not in extensions:
                  continue
              try:
                  original = file.read_text(encoding='utf-8')
              except UnicodeDecodeError:
                  continue
              updated = original
              for old, new in replacements.items():
                  updated = updated.replace(old, new)
              if updated != original:
                  file.write_text(updated, encoding='utf-8')

          main = Path('src/main.jsx')
          source = main.read_text(encoding='utf-8')
          import_line = "import './styles/moura-theme.css'"
          if import_line not in source:
              source = source.replace("import './styles/brand-logo.css'", "import './styles/brand-logo.css'\n" + import_line)
              main.write_text(source, encoding='utf-8')
          PY

          cp public/images/team-rafael.jpg public/images/team-lucas.jpg 2>/dev/null || true
          cp public/images/team-marina.jpg public/images/team-helena.jpg 2>/dev/null || true

      - name: Criar logotipo e equipe próprios
        shell: bash
        run: |
          set -euo pipefail
          cat > src/components/Brand.jsx <<'EOF'
          import { Link } from 'react-router-dom'
          import { SITE_SHORT_NAME } from '../utils/constants'

          export default function Brand({ footer = false }) {
            return (
              <Link
                className={`brand ${footer ? 'brand--footer' : ''}`}
                to="/"
                aria-label={`${SITE_SHORT_NAME} - página inicial`}
              >
                <span className="brand__mark" aria-hidden="true">
                  <span className="brand__letter brand__letter--top">M</span>
                  <span className="brand__amp">&</span>
                  <span className="brand__letter brand__letter--bottom">V</span>
                </span>
                <span className="brand__text">
                  <strong>Moura & Vasconcelos</strong>
                  <small>Advocacia</small>
                </span>
              </Link>
            )
          }
          EOF

          cat > src/data/team.js <<'EOF'
          const asset = (file) => `${import.meta.env.BASE_URL}images/${file}`

          export const teamMembers = [
            {
              name: 'Dra. Helena Moura',
              role: 'Advogada sócia',
              oab: 'OAB/PI 00.000',
              image: asset('team-helena.jpg'),
              imageAlt: 'Fotografia ilustrativa de profissional feminina em ambiente corporativo',
              bio: 'Atuação demonstrativa em questões previdenciárias, trabalhistas e familiares, com escuta cuidadosa, organização documental e comunicação acessível.',
              education: 'Bacharel em Direito e especialista em Direito Previdenciário e Relações do Trabalho.',
              areas: ['Direito Previdenciário', 'Direito Trabalhista', 'Direito de Família'],
            },
            {
              name: 'Dr. Lucas Vasconcelos',
              role: 'Advogado sócio',
              oab: 'OAB/PI 00.001',
              image: asset('team-lucas.jpg'),
              imageAlt: 'Fotografia ilustrativa de profissional masculino em ambiente corporativo',
              bio: 'Atuação demonstrativa em questões cíveis, empresariais e contratuais, com foco em prevenção de riscos e decisões juridicamente organizadas.',
              education: 'Bacharel em Direito e especialista em Direito Civil, Contratos e Negócios.',
              areas: ['Direito Civil', 'Direito Empresarial', 'Contratos'],
            },
          ]
          EOF

          cat > public/favicon.svg <<'EOF'
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
            <rect width="128" height="128" rx="32" fill="#0b3b33"/>
            <circle cx="64" cy="64" r="43" fill="none" stroke="#d49a77" stroke-width="3"/>
            <path d="M35 83V43h9l20 26 20-26h9v40H82V60L64 82 46 60v23z" fill="#f5efe5"/>
          </svg>
          EOF

          cat > public/images/social-share.svg <<'EOF'
          <svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
            <rect width="1200" height="630" fill="#f5efe5"/>
            <rect width="430" height="630" fill="#0b3b33"/>
            <circle cx="215" cy="315" r="128" fill="none" stroke="#d49a77" stroke-width="5"/>
            <text x="215" y="350" text-anchor="middle" fill="#fffdf9" font-family="Georgia,serif" font-size="102" font-weight="700">MV</text>
            <text x="510" y="260" fill="#0b3b33" font-family="Georgia,serif" font-size="72" font-weight="700">Moura &amp; Vasconcelos</text>
            <text x="514" y="322" fill="#b56f4b" font-family="Arial,sans-serif" font-size="28" font-weight="700" letter-spacing="9">ADVOCACIA</text>
            <text x="514" y="420" fill="#52615c" font-family="Arial,sans-serif" font-size="29">Clareza para decidir. Estratégia para avançar.</text>
          </svg>
          EOF

      - name: Aplicar identidade visual e layout exclusivos
        shell: bash
        run: |
          set -euo pipefail
          cat > src/styles/moura-theme.css <<'EOF'
          :root {
            --navy-950: #0b3b33;
            --navy-900: #10483f;
            --navy-800: #176055;
            --navy-700: #277568;
            --gold-600: #a85f3d;
            --gold-500: #b96f4b;
            --gold-300: #d8a181;
            --gray-25: #fffdf9;
            --gray-50: #f7f2e9;
            --gray-100: #eee5d8;
            --gray-200: #ded2c1;
            --gray-300: #c9bdad;
            --gray-500: #718079;
            --gray-700: #43524d;
            --gray-900: #1c2926;
            --green-600: #167454;
            --green-100: #e3f1eb;
            --shadow-sm: 0 9px 26px rgba(11, 59, 51, 0.07);
            --shadow-md: 0 22px 58px rgba(11, 59, 51, 0.13);
            --shadow-lg: 0 34px 86px rgba(7, 45, 39, 0.22);
            --radius-sm: 10px;
            --radius-md: 18px;
            --radius-lg: 30px;
            --header-height: 86px;
          }

          body { background: #fffdf9; }
          ::selection { background: #d8a181; color: #0b3b33; }
          .section { padding: 108px 0; }
          .section--soft { background: #f5efe5; }
          .button { border-radius: 999px; padding-inline: 23px; }
          .button--gold { color: #fff; background: #b56f4b; }
          .button--gold:hover { color: #fff; background: #9e5b3b; }
          .button--primary { background: #0b3b33; }
          .button--primary:hover { background: #176055; }

          .site-header {
            border-bottom: 1px solid rgba(11,59,51,.12);
            background: rgba(255,253,249,.96);
          }
          .brand { gap: 14px; }
          .brand__mark {
            width: 54px;
            height: 54px;
            color: #0b3b33 !important;
            border: 2px solid currentColor !important;
            background: transparent !important;
          }
          .brand__mark span,
          .brand__letter,
          .brand__amp,
          .brand__text strong,
          .brand__text small { color: #0b3b33 !important; }
          .brand--footer .brand__mark,
          .brand--footer .brand__mark span,
          .brand--footer .brand__letter,
          .brand--footer .brand__amp,
          .brand--footer .brand__text strong,
          .brand--footer .brand__text small { color: #f5efe5 !important; }
          .brand__text strong { font-size: 1.12rem; }
          .main-nav__links > a::after,
          .nav-dropdown > button::after { background: #b56f4b; }

          .hero {
            min-height: 730px;
            color: #1c2926;
            background: linear-gradient(100deg, #fffdf9 0 58%, #0b3b33 58% 100%);
          }
          .hero__pattern {
            opacity: .38;
            background:
              radial-gradient(circle at 15% 35%, rgba(181,111,75,.16), transparent 24%),
              radial-gradient(circle at 88% 22%, rgba(216,161,129,.18), transparent 24%);
            mask-image: none;
          }
          .hero__content h1 { color: #0b3b33; max-width: 720px; }
          .hero__content > p { color: #52615c; }
          .hero .eyebrow--light { color: #a85f3d; }
          .hero__trust { color: #0b3b33; border-color: rgba(11,59,51,.18); }
          .hero__visual--photo { transform: translateY(22px); }
          .hero__visual--photo img {
            border-radius: 170px 22px 170px 22px;
            box-shadow: 0 32px 80px rgba(4,37,31,.28);
          }
          .hero__visual--photo::before {
            border-color: #d8a181;
            border-radius: 170px 22px 170px 22px;
          }
          .hero__visual-card {
            color: #fff;
            background: #b56f4b;
            border-radius: 18px 60px 18px 18px;
          }
          .hero__visual-card p { color: #fff; }
          .hero .button--light-outline {
            color: #0b3b33;
            border-color: #0b3b33;
            background: transparent;
          }

          .institutional-strip { background: #0b3b33; }
          .institutional-strip article > span {
            color: #f5efe5;
            background: rgba(181,111,75,.28);
          }

          .about-preview .split-layout {
            grid-template-columns: .92fr 1.08fr;
            gap: 90px;
          }
          .image-frame--premium img { border-radius: 24px 150px 24px 24px; }
          .image-frame__detail { border-radius: 999px; background: #0b3b33; }

          .area-card {
            border-radius: 24px 24px 70px 24px;
            border-color: rgba(11,59,51,.12);
          }
          .area-card:hover { border-color: #b56f4b; transform: translateY(-7px); }

          .differences-section { background: #fffdf9; }
          .principles-card--premium {
            color: #fff;
            border-radius: 26px 100px 26px 26px;
            background: #0b3b33;
          }
          .principles-card--premium h2,
          .principles-card--premium p { color: #fff !important; }
          .principles-card__number { color: #d8a181 !important; }

          .team-card {
            border-radius: 24px 90px 24px 24px;
            overflow: hidden;
          }
          .team-card__image img { filter: saturate(.88) contrast(1.02); }
          .article-card { border-radius: 24px 24px 70px 24px; overflow: hidden; }
          .cta-section--premium { background: #b56f4b; }
          .site-footer { background: #072f29; }

          @media (max-width: 900px) {
            .hero {
              min-height: auto;
              background: linear-gradient(180deg, #fffdf9 0 58%, #0b3b33 58% 100%);
            }
            .hero__content h1 { font-size: clamp(2.7rem, 11vw, 4.8rem); }
            .hero__visual--photo { transform: none; }
            .about-preview .split-layout { grid-template-columns: 1fr; gap: 48px; }
          }

          @media (max-width: 640px) {
            :root { --header-height: 78px; }
            .section { padding: 78px 0; }
            .brand__mark { width: 48px; height: 48px; }
            .brand__text strong { font-size: .94rem; }
            .brand__text small { font-size: .55rem; }
            .hero { padding-top: 46px; }
            .hero__visual--photo img,
            .hero__visual--photo::before { border-radius: 100px 18px 100px 18px; }
            .hero__visual-card { border-radius: 16px 44px 16px 16px; }
            .principles-card--premium { border-radius: 22px 70px 22px 22px; }
          }
          EOF

      - name: Atualizar fotografias do novo portfólio
        shell: bash
        run: |
          set -euo pipefail
          curl -fL --retry 3 'https://images.unsplash.com/photo-1497366811353-6870744d04b2?auto=format&fit=crop&w=1600&q=84' -o public/images/hero-office.jpg || true
          curl -fL --retry 3 'https://images.unsplash.com/photo-1497366754035-f200968a6e72?auto=format&fit=crop&w=1500&q=84' -o public/images/about-office.jpg || true
          curl -fL --retry 3 'https://images.unsplash.com/photo-1573496359142-b8d87734a5a2?auto=format&fit=crop&w=1000&q=84' -o public/images/team-helena.jpg || true
          curl -fL --retry 3 'https://images.unsplash.com/photo-1560250097-0b93528c311a?auto=format&fit=crop&w=1000&q=84' -o public/images/team-lucas.jpg || true

      - name: Configurar Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20.19.5
          cache: npm

      - name: Instalar, validar e construir
        run: |
          npm ci
          npm run lint:imports
          npm run build

      - name: Registrar o projeto completo
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Cria projeto completo Moura & Vasconcelos Advocacia'
          git push

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v6
        with:
          enablement: true

      - name: Enviar a pasta dist
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./dist
          retention-days: 1
          include-hidden-files: true

      - name: Publicar o site
        id: deployment
        uses: actions/deploy-pages@v5
