name: Publicar Moura e Vasconcelos

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    name: Construir e validar site
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Baixar o repositório
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.5
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Gerar e auditar o site
        run: npm run build

      - name: Confirmar páginas principais
        shell: bash
        run: |
          set -euo pipefail
          test -f dist/index.html
          test -f dist/sobre/index.html
          test -f dist/areas-de-atuacao/index.html
          test -f dist/equipe/index.html
          test -f dist/artigos/index.html
          test -f dist/contato/index.html
          test -f dist/404.html
          grep -q 'Moura &amp; Vasconcelos' dist/index.html
          grep -q 'data-prerendered="true"' dist/index.html

      - name: Ler configuração do GitHub Pages
        uses: actions/configure-pages@v6

      - name: Enviar exclusivamente a pasta dist
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./dist
          retention-days: 1
          include-hidden-files: true

  deploy:
    name: Publicar no GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Publicar site
        id: deployment
        uses: actions/deploy-pages@v5
