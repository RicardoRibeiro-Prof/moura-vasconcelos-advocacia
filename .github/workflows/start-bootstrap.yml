name: Iniciar montagem do projeto

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  actions: write

jobs:
  start:
    if: github.event_name == 'workflow_dispatch' || github.event.head_commit.message == 'Iniciar montagem do novo projeto'
    runs-on: ubuntu-latest
    steps:
      - name: Disparar o instalador principal
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          curl --fail-with-body --request POST \
            --url "https://api.github.com/repos/${{ github.repository }}/actions/workflows/bootstrap-project.yml/dispatches" \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            --data '{"ref":"main"}'
