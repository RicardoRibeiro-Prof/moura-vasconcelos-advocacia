name: Montar e publicar projeto corrigido

on:
  push:
    paths:
      - '.github/workflows/bootstrap-project-fixed.yml'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: bootstrap-moura-vasconcelos-fixed
  cancel-in-progress: false

jobs:
  build-project:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      VITE_SITE_URL: https://ricardoribeiro-prof.github.io/moura-vasconcelos-advocacia
      VITE_BASE_PATH: /moura-vasconcelos-advocacia/
      VITE_IS_DEMO: 'true'
      VITE_ALLOW_INDEXING: 'false'
      VITE_PRODUCTION_DATA_CONFIRMED: 'false'

    steps:
      - name: Baixar o repositório novo
        uses: actions/checkout@v7

      - name: Copiar a base técnica sem substituir workflows
        shell: bash
        run: |
          set -euo pipefail
          git clone --depth 1 https://github.com/RicardoRibeiro-Prof/almeida-castro-advocacia.git /tmp/template
          rsync -a --delete \
            --exclude='.git' \
            --exclude='.github/workflows' \
            /tmp/template/ ./

      - name: Aplicar identidade, textos e equipe do novo escritório
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --disable-pip-version-check --quiet pyyaml
          python <<'PY'
          from pathlib import Path
          import subprocess
          import yaml

          workflow = Path('.github/workflows/bootstrap-project.yml')
          data = yaml.safe_load(workflow.read_text(encoding='utf-8'))
          selected = {
              'Aplicar nova marca, textos e endereços',
              'Criar logotipo e equipe próprios',
              'Aplicar identidade visual e layout exclusivos',
              'Atualizar fotografias do novo portfólio',
          }

          steps = data['jobs']['build-project']['steps']
          found = set()
          for step in steps:
              name = step.get('name')
              script = step.get('run')
              if name not in selected:
                  continue
              if not script:
                  raise SystemExit(f'Etapa sem script: {name}')
              print(f'Executando: {name}', flush=True)
              subprocess.run(['bash', '-euo', 'pipefail', '-c', script], check=True)
              found.add(name)

          missing = selected - found
          if missing:
              raise SystemExit(f'Etapas não encontradas: {sorted(missing)}')
          PY

      - name: Configurar Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20.19.5
          cache: npm

      - name: Instalar, validar e construir
        run: |
          npm ci
          npm run lint:imports
          npm run build

      - name: Confirmar a saída pré-renderizada
        shell: bash
        run: |
          set -euo pipefail
          test -f dist/index.html
          test -f dist/sobre/index.html
          test -f dist/areas-de-atuacao/index.html
          test -f dist/artigos/index.html
          test -f dist/contato/index.html
          test -f dist/404.html
          grep -q 'data-prerendered="true"' dist/index.html
          grep -q 'Moura &amp; Vasconcelos' dist/index.html

      - name: Registrar o projeto completo
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          if git diff --cached --quiet; then
            echo 'Nenhuma alteração pendente para registrar.'
          else
            git commit -m 'Cria projeto completo Moura & Vasconcelos Advocacia'
            git push
          fi

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v6
        with:
          enablement: true

      - name: Enviar exclusivamente a pasta dist
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./dist
          retention-days: 1
          include-hidden-files: true

      - name: Publicar o site
        id: deployment
        uses: actions/deploy-pages@v5
